<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabeltrainer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style = "display: flex; flex-direction: column; align-items: center; margin: 0px; height: 100vh;">


    <div id="container-1">
        <div id="heading">
            <h1>Vocabeltrainer</h1>
            <button id = "buttzurück" onclick = "zurück()">Zurück</button>
        </div>

        <div id="zeile-1">
            <h3 hidden id = "lat"></h3>
            <h3 hidden id = "wortanzahl"></h3>
            <button id = "falscheVokabelwiederholen" onclick = "wiederholen()">Falsche Vokabel wiederholen</button>
        </div>

        <div id="vokabel-auswahl">
            <input type = "text" placeholder="Fach (Latein, Engilsch)" id = "fach">
            <input type = "text" placeholder="Buch (z.B. Adeamus, G1)" id = "buch">
            <input type = "text" placeholder="Wortschatz (WS1 Unit1)" id = "wortschatz">
            <button type = "button" id = ok onclick="Vocabulary()">Ok</button>
        </div>

    </div>

    <div id="container-2">
        <p class="abfrage-zeile" id = "stammform">
            <input type = "text" placeholder="Stammformen" id = "stammformo">
        </p>
        <p class="abfrage-zeile" id = "deutschl">
            <input type = "text" placeholder="Deutsche bedeutung" id = "deutschlo">
        </p>
        <p class="abfrage-zeile" id = "butook">
            <button type = "button" id = buttooko onclick="limmer()">Ok</button>
        </p>
    </div>
        

         
    <div id="container-3">
        <ul id = "vocabularyList"></ul> 
        <ul id = "richtigevocabularyList"></ul>
    </div>

    <script src = "logik.js"></script>
</body>
</html>
